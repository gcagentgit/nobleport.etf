version: "3.9"

services:

  # ── NVAPI Gateway ─────────────────────────────────────────────────────────
  gateway:
    build: .
    container_name: cyborg-nvapi-gateway
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - ENV=testing
    depends_on:
      vault:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cyborg-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HashiCorp Vault (dev mode) ────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: cyborg-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-cyborg-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    networks:
      - cyborg-net
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Vault Init (one-shot: seeds NVAPI key into KV-v2) ────────────────────
  vault-init:
    image: hashicorp/vault:1.16
    container_name: cyborg-vault-init
    depends_on:
      vault:
        condition: service_healthy
    env_file: .env
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_TOKEN:-cyborg-dev-token}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Seeding Vault KV-v2 with NVAPI key..."
        vault secrets enable -path=secret kv-v2 2>/dev/null || true
        vault kv put secret/nobleport/nvapi/keys nvapi_key="${NVAPI_KEY}"
        echo "Vault seeded."
    networks:
      - cyborg-net
    restart: "no"

networks:
  cyborg-net:
    driver: bridge

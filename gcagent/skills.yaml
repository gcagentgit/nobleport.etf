---
# GCagent.ai — Skill Framework Manifest
# Declarative capability spec. Consumable by system-prompt builders,
# orchestrators, and capability routers.

agent:
  name: GCagent.ai
  version: 1.0.0
  role: >
    Technical collaborator for designing, building, and operating
    agentic systems. Bridges architectural intent and production-ready
    implementation across LLM workflows, tooling, memory, and infra.
  identity:
    ens: gcagent.nobleport.eth
    did: did:ens:gcagent.nobleport.eth

# -----------------------------------------------------------------------------
# Core skills — always-on capabilities
# -----------------------------------------------------------------------------
core_skills:

  - id: agent_architecture
    name: Agent System Architecture
    summary: Design single- and multi-agent systems with clear roles and comms.
    competencies:
      - single_agent_design
      - multi_agent_coordination
      - role_and_memory_boundaries
      - communication_patterns
    patterns:
      - planner_executor
      - react
      - toolformer
      - hierarchical_agents
      - supervisor_worker
    outputs: [architecture_diagrams, role_specs, interaction_protocols]

  - id: tool_integration
    name: Tooling & Function Integration
    summary: Define, route, and safely invoke external tools and APIs.
    competencies:
      - openai_function_tool_calling
      - json_schema_design
      - pydantic_schema_design
      - tool_routing_and_selection
      - auth_handling       # OAuth, API keys, signed requests
      - retry_and_error_handling
    integrations: [rest, graphql, webhooks, grpc]

  - id: workflow_orchestration
    name: LLM Workflow Orchestration
    summary: Compose multi-step LLM pipelines with state and concurrency.
    competencies:
      - task_decomposition
      - chaining_and_branching
      - state_management
      - async_and_parallel_execution
    frameworks: [langchain, langgraph, autogen, crewai, custom]

  - id: memory_management
    name: Memory & Context Management
    summary: Design short-/long-term memory and optimize context windows.
    competencies:
      - short_term_memory
      - long_term_memory
      - vector_database_integration
      - embedding_strategies
      - context_window_optimization
      - session_continuity
    stores: [pinecone, weaviate, qdrant, pgvector, chroma, redis]

  - id: rag_systems
    name: Retrieval-Augmented Generation
    summary: Ground responses in sourced, retrieved evidence.
    competencies:
      - document_ingestion
      - chunking_strategies
      - semantic_search_tuning
      - hybrid_retrieval          # keyword + vector
      - citation_and_grounding

  - id: debugging_observability
    name: Debugging & Observability
    summary: Inspect traces, evaluate outputs, prevent regressions.
    competencies:
      - agent_trace_inspection
      - prompt_and_tool_debugging
      - structured_logging
      - step_level_tracing
      - evaluation_frameworks
      - regression_testing

  - id: prompt_engineering
    name: Prompt Engineering (Production)
    summary: Design robust, modular prompts with guardrails.
    competencies:
      - system_prompt_design
      - role_and_constraint_encoding
      - few_shot_prompting
      - tool_use_prompting
      - guardrails_and_failure_handling
      - prompt_modularization

  - id: backend_infrastructure
    name: Backend & Infrastructure
    summary: Implement services, queues, and deployment targets.
    competencies:
      - python_patterns
      - nodejs_patterns
      - api_design
      - queue_systems           # celery, redis, kafka
      - containerization        # docker
      - serverless_deployment   # vercel, aws_lambda
      - persistent_services     # kubernetes

  - id: reliability_safety
    name: Reliability & Safety Engineering
    summary: Validate inputs, contain misuse, control cost and blast radius.
    competencies:
      - input_validation_and_sanitization
      - tool_misuse_prevention
      - rate_limiting
      - cost_controls
      - fallback_strategies
      - safe_completion_handling

  - id: performance_optimization
    name: Performance Optimization
    summary: Reduce tokens, latency, and cost without losing quality.
    competencies:
      - token_optimization
      - latency_reduction
      - response_caching
      - embedding_caching
      - model_selection_tradeoffs

  - id: workflow_automation
    name: Workflow Automation
    summary: Build autonomous, event- and schedule-driven pipelines.
    competencies:
      - data_processing_pipelines
      - report_generation
      - monitoring_agents
      - cron_and_event_triggers
      - human_in_the_loop

  - id: developer_experience
    name: Developer Experience (DX)
    summary: Generate, refactor, and review production-grade code.
    competencies:
      - boilerplate_generation
      - config_file_generation
      - api_schema_generation
      - refactoring
      - code_review
      - idea_to_architecture_translation

# -----------------------------------------------------------------------------
# Skill modules — pluggable, domain-specific extensions
# -----------------------------------------------------------------------------
skill_modules:
  - id: multi_agent_negotiation
    name: Multi-Agent Negotiation Systems
    requires: [agent_architecture, workflow_orchestration, prompt_engineering]

  - id: autonomous_research
    name: Autonomous Research Agents
    requires: [rag_systems, workflow_orchestration, memory_management]

  - id: code_generation
    name: Code Generation Agents
    requires: [prompt_engineering, developer_experience, tool_integration]

  - id: devops_automation
    name: DevOps Automation Agents
    requires: [backend_infrastructure, workflow_automation, reliability_safety]

  - id: customer_support
    name: Customer Support AI Agents
    requires: [rag_systems, workflow_orchestration, reliability_safety]

  - id: internal_knowledgebase
    name: Internal Knowledgebase Assistants
    requires: [rag_systems, memory_management, prompt_engineering]

# -----------------------------------------------------------------------------
# Capability routing — short tags for system-prompt shorthand
# -----------------------------------------------------------------------------
capabilities:
  - agent_architecture
  - tool_integration
  - workflow_orchestration
  - memory_management
  - rag_systems
  - debugging_observability
  - prompt_engineering
  - backend_infrastructure
  - reliability_safety
  - performance_optimization
  - workflow_automation
  - developer_experience

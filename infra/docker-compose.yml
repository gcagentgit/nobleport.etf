version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nobleport
      POSTGRES_USER: nobleport
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-strongpassword}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../services/stephanie_api/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobleport"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: services/stephanie_api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../services/stephanie_api/.env
    environment:
      DATABASE_URL: "postgresql://nobleport:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/nobleport"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "127.0.0.1:8000:8000"

  web:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8000"
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:

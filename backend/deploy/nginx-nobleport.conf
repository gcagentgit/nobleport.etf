# NoblePort Backend - Nginx Reverse Proxy Configuration
#
# Install: sudo cp nginx-nobleport.conf /etc/nginx/sites-available/nobleport
#          sudo ln -s /etc/nginx/sites-available/nobleport /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream nobleport_backend {
    server 127.0.0.1:8400;
    keepalive 32;
}

server {
    listen 80;
    server_name api.nobleport.local;

    # Redirect HTTP to HTTPS in production
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://nobleport_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for realtime sync)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Media file uploads
    location /api/media/upload {
        proxy_pass http://nobleport_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100M;
    }

    # Health check (no logging)
    location /api/health {
        proxy_pass http://nobleport_backend;
        access_log off;
    }

    # Static files / media storage
    location /media/ {
        alias /opt/nobleport/data/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
